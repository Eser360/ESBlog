# 网站的基本信息
site:
  tab: Eser Sevinç # Tarayıcı sekme çubuğu görüntülenir
  title: 💠 Eser Sevinç # Web sitesinin başlığı
  description: Yazılım sektöründe; İş Analizi, Proje Yönetimi, Ekip Yönetimi ve Liderlik gibi konular üzerine bilgi birikimi. # 网站的描述，用于SEO等
  language: en # Web sitesinin dili, örneğin "en" İngilizce
  favicon: /favicon.ico # Tarayıcı sekmelerinde ve diğer yerlerde kullanılan web sitesinin simgesi
  theme: # Daha fazla tema için https://daisyui.com/docs/themes/
    light: lofi # Açık mod
    dark: black # Koyu mod
    code: github-dark # Kod bloğunun teması https://shiki.style/themes
  date_format: ddd MMM DD YYYY # Tarih biçimi ayarı, özel biçimi destekler
  blog: # Blog ile ilgili yapılandırma
    pageSize: 7 # Sayfa başına görüntülenecek makale sayısı
  menu: # Menü yapılandırması
    - id: home # Öğe için benzersiz tanımlayıcı
      text: Home # Menü öğesi görüntüleme
      href: / # Menü öğesi bağlantısının URL'si
      svg: "material-symbols:home-outline-rounded"
      target: _self
    - id: about
      text: About
      href: /about
      svg: "material-symbols:info-outline-rounded"
      target: _self
    - id: blog
      text: Blogs
      href: /blog
      svg: "material-symbols:book-2-outline-rounded"
      target: _self
      # subItems:
        # - id: all
        #  text: All blogs
        #  href: /blog
        #  svg: "material-symbols:ink-pen-outline-rounded"
        #  target: _self
        # - id: tech
        #  text: Tech blogs
        #  href: /blog/category/tech
        #  svg: "material-symbols:deployed-code-outline"
        #  target: _self
        # - id: life
        #  text: Life blogs
        #  href: /blog/category/life
        #  svg: "material-symbols:earthquake-rounded"
        #  target: _self
        # 子菜单项配置
    - id: project
      text: Projeler
      href: /project
      svg: "material-symbols:code-blocks-outline"
      target: _self
    - id: friend
      text: Blogroll
      href: /friend
      svg: "material-symbols:supervisor-account-outline-rounded"
      target: _self
    - id: contact
      text: İletişim
      href: "mailto:contact.evesunmaple@outlook.com"
      target: _blank # 在新标签页打开
      svg: "material-symbols:attach-email-outline-rounded"

